llm:
  default_provider: google  # openai | claude | google

  openai:
    model: gpt-4o
    temperature: 0.7
    max_tokens: 4096

  claude:
    model: claude-3-5-sonnet-20241022
    temperature: 0.7
    max_tokens: 4096

  google:
    model: gemini-3.1-flash-lite
    temperature: 1.0
    max_tokens: 4096
